- nombre: "Criptografía con Python"
  url: "/materias/criptografia"
  icono: "🔐"
  descripcion_corta: "Fundamentos y técnicas modernas de criptografía"
  descripcion: >
    Estudio de algoritmos criptográficos simétricos, asimétricos, funciones hash
    y aplicaciones prácticas usando Python. Se cubren temas como RSA, AES,
    curvas elípticas y protocolos de autenticación.
  temas:
    - Fundamentos de criptografía
    - Aritmética modular
    - Criptografía simétrica (bloques)
    - Criptografía de flujo y MACs
    - Funciones hash criptográficas
    - Criptografía asimétrica (RSA)
    - Curvas elípticas (ECC)
  repositorio: "https://github.com/DanielSotoV/Clases/tree/main/Criptografia"
  color: "purple"

- nombre: "Docker y Contenedores"
  url: "/materias/docker"
  icono: "🐳"
  descripcion_corta: "Contenedores, imágenes y orquestación con Docker"
  descripcion: >
    Introducción a la contenerización con Docker: creación de imágenes,
    gestión de contenedores, Docker Compose para orquestación y
    despliegue de aplicaciones en entornos aislados.
  temas:
    - Introducción a Docker
    - Imágenes y contenedores
    - Dockerfile y buenas prácticas
    - Redes y volúmenes
    - Docker Compose
    - Orquestación y operaciones
  repositorio: "https://github.com/DanielSotoV/Clases/tree/main/Docker"
  color: "blue"

- nombre: "Construcción de Sitios Web"
  url: "/materias/construccion-web"
  icono: "🌐"
  descripcion_corta: "Desarrollo y publicación de sitios web con GitHub"
  descripcion: >
    Metodologías y herramientas para construir y publicar sitios web modernos
    usando GitHub Pages, Jekyll y flujos de trabajo con Git. Incluye despliegue
    continuo y mantenimiento de sitios estáticos.
  temas:
    - Introducción a GitHub Pages
    - Jekyll y generadores estáticos
    - Temas y personalización
    - Markdown y Liquid templates
    - Dominio personalizado y configuración
    - Flujos de trabajo Git/GitHub
  repositorio: "https://github.com/DanielSotoV/Clases/tree/main/ConstruccionSitioWeb"
  color: "green"
